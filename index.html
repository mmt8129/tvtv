<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<title>TV Box M3U Player</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: black;
    overflow: hidden;
    height: 100%;
  }
  #video {
    width: 100%;
    height: 100%;
    background: black;
  }
  #channelList {
    position: fixed;
    top: 10px; left: 10px;
    width: 300px; max-height: 400px;
    background: rgba(0,0,0,0.8);
    color: white; padding: 10px; overflow-y: auto;
    border-radius: 8px;
    display: block;
    z-index: 9999;
  }
  #channelList div {
    padding: 8px; cursor: pointer; border-radius: 4px;
  }
  #channelList div:hover, #channelList div.selected {
    background: #0066ff;
  }
  #channelName {
    position: fixed; bottom: 80px; width: 100%; text-align: center;
    color: #fff; font-size: 24px; font-weight: bold;
    text-shadow: 0 0 5px black;
    background: rgba(0,0,0,0.5);
    display: none; padding: 10px 0; z-index: 999;
  }
  #loading {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 24px; color: #fff; display: none; z-index: 1000;
  }
  #volumeBar {
    position: fixed; right: 20px; bottom: 20px;
    width: 30px; height: 200px; background: rgba(255,255,255,0.2);
    border-radius: 4px; overflow: hidden; display: none; z-index: 999;
  }
  #volumeLevel {
    position: absolute; bottom: 0; width: 100%; height: 50%; background: lime;
  }
</style>
</head>
<body>

<video id="video"></video>
<div id="loading">Yükleniyor...</div>
<div id="channelName"></div>
<div id="volumeBar"><div id="volumeLevel"></div></div>
<div id="channelList"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const video = document.getElementById('video');
const playlistUrl = '1.m3u';

const channelListDiv = document.getElementById('channelList');
const channelNameDiv = document.getElementById('channelName');
const loadingDiv = document.getElementById('loading');
const volumeBar = document.getElementById('volumeBar');
const volumeLevel = document.getElementById('volumeLevel');

let channels = [];
let currentIdx = 0;
let hls = null;
let volume = 50;
let hideChannelListTimeout = null;
let hideInfoTimeout = null;
let volumeTimeout = null;

// Dosya yükleme ve listesi
fetch(playlistUrl)
  .then(res => res.text())
  .then(parseM3U)
  .then(initialize)
  .catch(() => alert('M3U dosyası yüklenemedi!'));

function parseM3U(data) {
  channels = [];
  const lines = data.split(/\r?\n/);
  let currentName = '';
  for(let i=0; i<lines.length; i++) {
    if(lines[i].startsWith('#EXTINF')) {
      const match = lines[i].match(/#EXTINF:-?\d*,(.*)/);
      if(match) currentName = match[1].trim();
    } else if(lines[i].startsWith('http') || lines[i].startsWith('/')) {
      channels.push({name: currentName || 'Kanal', url: lines[i].trim()});
      currentName = '';
    }
  }
}

function initialize() {
  populateChannelList();
  loadChannel(currentIdx);
  document.addEventListener('keydown', handleKey);
  // Otomatik ilk kanal
}

function populateChannelList() {
  channelListDiv.innerHTML = '';
  channels.forEach((ch, i) => {
    const div = document.createElement('div');
    div.textContent = ch.name;
    if(i===currentIdx) div.classList.add('selected');
    div.onclick = () => {
      loadChannel(i);
      highlightChannel(i);
      showChannelList();
    }
    channelListDiv.appendChild(div);
  });
}

function highlightChannel(index) {
  Array.from(channelListDiv.children).forEach((el,i) => {
    el.classList.toggle('selected', i===index);
  });
}

function showChannelList() {
  channelListDiv.style.display = 'block';
  if(hideChannelListTimeout) clearTimeout(hideChannelListTimeout);
  hideChannelListTimeout = setTimeout(()=> {
    channelListDiv.style.display='none';
  },3000);
}

function showLoading(show=true) {
  loadingDiv.style.display = show ? 'block' : 'none';
}

function showChannelName(name) {
  clearTimeout(hideInfoTimeout);
  channelNameDiv.textContent = name;
  channelNameDiv.style.display='block';
  hideInfoTimeout = setTimeout(()=> {
    channelNameDiv.style.display='none';
  },5000);
}

function loadChannel(index) {
  currentIdx = index;
  const ch = channels[index];
  showLoading(true);
  highlightChannel(index);
  // HLS yatkınlık
  if(hls) { hls.destroy(); hls=null; }
  // Çok formatlı oynatma
  if(Hls.isSupported() && (ch.url.endsWith('.m3u8') || ch.url.includes('.ts') || ch.url.includes('.m3u'))) {
    hls = new Hls();
    hls.loadSource(ch.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=> {
      showLoading(false);
      showChannelName(ch.name);
      video.play();
    });
    hls.on(Hls.Events.ERROR, (e,d)=> {
      console.log('HLS hata', d);
      showLoading(false);
      showChannelName('Hata: Yayın yüklenemedi');
    });
  } else {
    // Doğrudan video-src
    video.src = ch.url;
    video.load();
    video.oncanplay = () => {
      showLoading(false);
      showChannelName(ch.name);
      video.play();
    }
    video.onerror = ()=> {
      showLoading(false);
      showChannelName('Yayın açılamadı');
    }
  }
}

// Şifreleme veya tam ekran gerekebilir, ama temel
if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});

// Kumanda: Tuş olayları
function handleKey(e) {
  switch(e.key) {
    case 'ArrowUp': // önceki kanal
      loadChannel((currentIdx -1 + channels.length) % channels.length);
      highlightChannel(currentIdx);
      showChannelList();
      break;
    case 'ArrowDown': // sonraki kanal
      loadChannel((currentIdx +1) % channels.length);
      highlightChannel(currentIdx);
      showChannelList();
      break;
    case 'ArrowLeft':
      // Ses azalt
      volume = Math.max(0, volume -5);
      updateVolume();
      break;
    case 'ArrowRight':
      // Ses artır
      volume = Math.min(100, volume +5);
      updateVolume();
      break;
    case 'm':
    case 'Escape':
    case 'Menu':
      // Menü (kanal listesi göster/gizle)
      if(channelListDiv.style.display==='block'){
        channelListDiv.style.display='none'
      } else {
        showChannelList();
      }
      break;
  }
}

// Ses göstergesi
function updateVolume() {
  video.volume = volume/100;
  volumeLevel.style.height = volume + '%';
  volumeBar.style.display='block';
  if(volumeTimeout) clearTimeout(volumeTimeout);
  volumeTimeout=setTimeout(()=> {
    volumeBar.style.display='none';
  },2000);
}
// başlangıçta ses
updateVolume();
</script>
</body>
</html>
