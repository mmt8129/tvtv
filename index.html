<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<title>TV Box M3U Oynatıcı</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: black;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  #videoContainer {
    position: fixed;
    top:0; left:0; right:0; bottom:0;
  }
  video {
    width: 100%;
    height: 100%;
  }

#channelList {
  position: fixed;
  top: 50px;
  left: 10px;
  width: 250px;
  max-height: 400px;
  overflow-y: auto;
  background: rgba(0,0,0,0.7);
  color: white;
  padding: 10px;
  display: none;
  border-radius: 8px;
  z-index: 999;
}

#channelList.show {
  display: block;
  transition: opacity 0.5s;
  opacity: 1;
}

#channelInfo {
  position: fixed;
  bottom: 50px;
  width: 100%;
  text-align: center;
  font-size: 24px;
  color: white;
  display: none;
  z-index: 998;
}

#loading {
  position: fixed;
  bottom: 120px;
  width: 100%;
  text-align: center;
  font-size: 20px;
  color: white;
  display: none;
  z-index: 998;
}

#volumeIndicator {
  position: fixed;
  right: 20px;
  bottom: 20px;
  width: 30px;
  height: 200px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  overflow: hidden;
  display: none;
}

#volumeLevel {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 50%;
  background: lime;
}

</style>
</head>
<body>

<div id="videoContainer">
  <video id="videoPlayer" autoplay muted playsinline></video>
</div>

<div id="channelList"></div>
<div id="channelInfo"></div>
<div id="loading">Buffering...</div>
<div id="volumeIndicator"><div id="volumeLevel"></div></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
const video = document.getElementById('videoPlayer');
const channelListDiv = document.getElementById('channelList');
const channelInfoDiv = document.getElementById('channelInfo');
const loadingDiv = document.getElementById('loading');
const volumeIndicator = document.getElementById('volumeIndicator');
const volumeLevel = document.getElementById('volumeLevel');

let channels = [];
let currentChannelIndex = 0;
let showChannelListTimeout = null;
let volume = 50;

const m3uUrl = '1.m3u';
let hls = null;

fetch(m3uUrl)
.then(res => res.text())
.then(parseM3U)
.then(() => {
  if(channels.length > 0){
    loadChannel(currentChannelIndex);
  }
});

function parseM3U(data) {
  channels = [];
  const lines = data.split('\n').map(l => l.trim()).filter(l => l);
  let currentUrl = '';
  let currentName = '';
  for(let i=0; i<lines.length; i++) {
    if(lines[i].startsWith('#EXTINF')) {
      const match = lines[i].match(/#EXTINF.*?,(.*)$/);
      if(match) currentName = match[1];
    } else if(lines[i].startsWith('http') || lines[i].startsWith('/')) {
      currentUrl = lines[i];
      channels.push({name: currentName, url: currentUrl});
    }
  }
  populateChannelList();
}

function populateChannelList() {
  channelListDiv.innerHTML = '';
  channels.forEach((ch, idx) => {
    const item = document.createElement('div');
    item.textContent = ch.name;
    item.style.padding = '5px';
    item.style.cursor = 'pointer';
    item.onclick = () => {
      loadChannel(idx);
    };
    channelListDiv.appendChild(item);
  });
}

function showChannelList() {
  channelListDiv.classList.add('show');
  if(showChannelListTimeout) clearTimeout(showChannelListTimeout);
  showChannelListTimeout = setTimeout(() => {
    channelListDiv.classList.remove('show');
  }, 3000);
}

function loadChannel(index) {
  currentChannelIndex = index;
  const ch = channels[index];
  showLoading();

  if (Hls.isSupported()) {
    if (hls) {
      hls.destroy();
    }
    hls = new Hls();
    hls.loadSource(ch.url);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, function() {
      hideLoading();
      video.play();
      showChannelInfo(ch.name);
    });
    hls.on(Hls.Events.ERROR, function (event, data) {
      console.warn('HLS Error: ', data);
      hideLoading();
      showChannelInfo('Kanal Yüklenemedi');
    });
  } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = ch.url;
    video.addEventListener('loadedmetadata', () => {
      hideLoading();
      video.play();
      showChannelInfo(ch.name);
    });
    video.addEventListener('error', () => {
      hideLoading();
      showChannelInfo('Kanal Yüklenemedi');
    });
  } else {
    console.error('HLS is not supported on this browser.');
    hideLoading();
    showChannelInfo('HLS Desteklenmiyor');
  }
}

function showLoading() {
  loadingDiv.style.display = 'block';
}

function hideLoading() {
  loadingDiv.style.display = 'none';
}

function showChannelInfo(name) {
  channelInfoDiv.textContent = name;
  channelInfoDiv.style.display = 'block';
  setTimeout(() => {
    channelInfoDiv.style.display = 'none';
  }, 2000);
}

document.documentElement.requestFullscreen && document.documentElement.requestFullscreen();

document.addEventListener('keydown', (e) => {
  if(e.key === 'ArrowLeft') {
    loadChannel((currentChannelIndex - 1 + channels.length) % channels.length);
  } else if(e.key === 'ArrowRight') {
    loadChannel((currentChannelIndex + 1) % channels.length);
  } else if(e.key === 'ArrowUp') {
    volume = Math.min(100, volume + 5);
    updateVolume();
  } else if(e.key === 'ArrowDown') {
    volume = Math.max(0, volume - 5);
    updateVolume();
  } else if(e.key === 'Menu' || e.key === 'm') {
    showChannelList();
  }
});

let volumeTimeout;
function updateVolume() {
  video.volume = volume/100;
  volumeLevel.style.height = volume + '%';
  volumeIndicator.style.display = 'block';
  if(volumeTimeout) clearTimeout(volumeTimeout);
  volumeTimeout = setTimeout(() => {
    volumeIndicator.style.display='none';
  }, 3000);
}
</script>

</body>
</html>
