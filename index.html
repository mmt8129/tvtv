<!DOCTYPE html>
<html lang="tr" class="bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; cursor: none; background-color: #000; }
        .full-screen-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        /* KANAL MENÜSÜ */
        .channel-menu { 
            position: absolute; top: 0; left: -30%; width: 30%; height: 100%; 
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px); 
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            padding: 1.5rem; display: flex; flex-direction: column; z-index: 50; 
            border-right: 1px solid rgba(255,255,255,0.1); 
        }
        .channel-menu.open { left: 0; }
        
        /* AKICI LİSTE VE ODAK */
        .channel-list-item { 
            padding: 0.8rem 1rem; font-weight: bold; color: #4dd0e1; 
            text-transform: uppercase; border-radius: 8px; border: 2px solid transparent; 
            margin-bottom: 0.3rem; font-size: 1rem; white-space: nowrap; 
            overflow: hidden; text-overflow: ellipsis; transition: background 0.1s, transform 0.1s;
        }
        .channel-list-item.selected { 
            background: rgba(77, 208, 225, 0.3); color: #fff; 
            border-color: #fff; transform: scale(1.02); 
        }

        /* ALT BİLGİ ŞERİDİ */
        .bottom-info-bar { 
            position: absolute; bottom: 0; left: 0; width: 100%; 
            background: linear-gradient(transparent, rgba(0,0,0,1)); 
            padding: 3.5rem 2rem 1.5rem; opacity: 0; transition: opacity 0.5s; 
            z-index: 40; pointer-events: none; 
        }

        /* SES BARI */
        .volume-container {
            position: absolute; bottom: 6rem; left: 50%; transform: translateX(-50%);
            width: 300px; height: 10px; background: rgba(255,255,255,0.1);
            border-radius: 20px; opacity: 0; transition: opacity 0.3s; z-index: 45;
        }
        .volume-bar { height: 100%; background: #FFC107; border-radius: 20px; transition: width 0.1s; }

        /* ÇIKIŞ DİYALOĞU */
        #exit-dialog { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.9); display: none; justify-content: center; 
            align-items: center; z-index: 100; 
        }
    </style>
</head>
<body class="bg-black text-white">

    <video id="video-player" class="full-screen-video" autoplay></video>

    <div id="channel-menu" class="channel-menu">
        <h2 class="text-xl font-black mb-6 tracking-widest border-b border-zinc-700 pb-2 text-cyan-400 uppercase">KANAL LİSTESİ</h2>
        <ul id="channel-list" class="flex-grow overflow-y-auto pr-2 custom-scroll"></ul>
    </div>

    <div id="bottom-info-bar" class="bottom-info-bar">
        <div id="info-label" class="text-xs font-bold text-zinc-500 tracking-widest uppercase">Oynatılıyor</div>
        <div id="info-channel-name" class="text-3xl font-black text-white uppercase">LİSTE YÜKLENİYOR...</div>
    </div>

    <div id="volume-container" class="volume-container">
        <div id="volume-bar" class="volume-bar" style="width: 50%;"></div>
    </div>

    <div id="exit-dialog">
        <div class="bg-zinc-900 p-10 rounded-3xl border border-zinc-700 text-center">
            <h2 class="text-2xl font-black mb-8 uppercase">Çıkış Yapılsın mı?</h2>
            <div class="flex gap-6 justify-center">
                <button onclick="window.close()" class="bg-red-600 px-10 py-3 rounded-xl font-bold uppercase">Evet</button>
                <button onclick="toggleExit(false)" class="bg-zinc-700 px-10 py-3 rounded-xl font-bold uppercase">Hayır</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const videoPlayer = document.getElementById('video-player');
        const channelList = document.getElementById('channel-list');
        const channelMenu = document.getElementById('channel-menu');
        const infoBar = document.getElementById('bottom-info-bar');
        const infoName = document.getElementById('info-channel-name');
        const infoLabel = document.getElementById('info-label');
        const volContainer = document.getElementById('volume-container');
        const volBar = document.getElementById('volume-bar');
        
        // SENİN ÖZEL SIRALAMA LİSTEN
        const ozelSiralama = [
            "TRT 1", "ATV", "STAR", "KANAL D", "NOW", "SHOW", "KANAL 7", "TV8", 
            "BEYAZ", "360", "TEVE2", "TV4", "TRT HABER", "CNN TURK", "NTV", 
            "TV100", "TLC", "DMAX", "TRT BELGESEL", "NAT GEO", "PLAY TV", "TON TV"
        ];

        let channels = [];
        let currentIdx = 0;
        let selectedIdx = 0;
        let hls = null;
        let zapTimer, menuTimer, infoTimer, volTimer;

        async function loadChannels() {
            try {
                const response = await fetch('1.txt?t=' + Date.now());
                if (!response.ok) throw new Error();
                const data = await response.text();
                const lines = data.split('\n');
                
                let hamListe = [];
                let currentName = "";

                lines.forEach(line => {
                    line = line.trim();
                    if (line.startsWith('#EXTINF')) {
                        const parts = line.split(',');
                        currentName = parts[parts.length - 1].trim();
                    } else if (line.startsWith('http')) {
                        hamListe.push({ name: currentName || "Adsız Kanal", url: line });
                        currentName = "";
                    }
                });

                // AKILLI SIRALAMA
                channels = [];
                ozelSiralama.forEach(name => {
                    const found = hamListe.find(ch => ch.name.toUpperCase().includes(name.toUpperCase()));
                    if (found) {
                        channels.push(found);
                        hamListe = hamListe.filter(item => item !== found);
                    }
                });
                channels = [...channels, ...hamListe];

                if (channels.length > 0) {
                    renderMenu();
                    playChannel(0);
                }
            } catch (err) {
                infoName.textContent = "DOSYA OKUNAMADI!";
            }
        }

        function playChannel(idx) {
            clearTimeout(zapTimer);
            zapTimer = setTimeout(() => {
                if (idx < 0) idx = channels.length - 1;
                if (idx >= channels.length) idx = 0;
                currentIdx = idx;
                const ch = channels[currentIdx];
                
                showInfo(ch.name);
                if (hls) hls.destroy();

                if (Hls.isSupported()) {
                    hls = new Hls({
                        maxBufferLength: 30, // Yavaş internet için tampon artırıldı
                        maxMaxBufferLength: 60,
                        enableWorker: true,
                        lowLatencyMode: false // Akıcılık için gecikme toleransı artırıldı
                    });
                    hls.loadSource(ch.url);
                    hls.attachMedia(videoPlayer);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play());
                    hls.on(Hls.Events.ERROR, (event, data) => {
                        if (data.fatal) showInfo("BAĞLANTI HATASI!", true);
                    });
                } else {
                    videoPlayer.src = ch.url;
                    videoPlayer.play();
                }
            }, 500);
        }

        function renderMenu() {
            channelList.innerHTML = '';
            channels.forEach((ch, i) => {
                const li = document.createElement('li');
                li.className = `channel-list-item ${i === selectedIdx ? 'selected' : ''}`;
                li.textContent = `${i + 1}. ${ch.name.toUpperCase()}`; // SIRA NUMARASI EKLENDİ
                channelList.appendChild(li);
            });
            const sel = channelList.querySelector('.selected');
            if (sel) sel.scrollIntoView({ block: 'center', behavior: 'smooth' });
        }

        function showInfo(name, isError = false) {
            clearTimeout(infoTimer);
            infoLabel.textContent = isError ? "HATA" : "Oynatılıyor";
            infoName.textContent = name;
            infoBar.style.opacity = "1";
            infoTimer = setTimeout(() => infoBar.style.opacity = "0", 4000);
        }

        function updateVolume(dir) {
            clearTimeout(volTimer);
            // 2'şer kademeli ses kontrolü (0.02 birim)
            let newVol = videoPlayer.volume + (dir * 0.02);
            videoPlayer.volume = Math.max(0, Math.min(1, newVol));
            volBar.style.width = (videoPlayer.volume * 100) + "%";
            volContainer.style.opacity = "1";
            volTimer = setTimeout(() => volContainer.style.opacity = "0", 2000);
        }

        function toggleMenu(show) {
            clearTimeout(menuTimer);
            if (show) {
                selectedIdx = currentIdx;
                renderMenu();
                channelMenu.classList.add('open');
                menuTimer = setTimeout(() => toggleMenu(false), 10000);
            } else {
                channelMenu.classList.remove('open');
            }
        }

        function toggleExit(show) { document.getElementById('exit-dialog').style.display = show ? 'flex' : 'none'; }

        window.addEventListener('keydown', (e) => {
            const isMenu = channelMenu.classList.contains('open');
            if (document.getElementById('exit-dialog').style.display === 'flex') return;

            switch (e.key) {
                case 'ArrowUp':
                    if (isMenu) { selectedIdx = (selectedIdx - 1 + channels.length) % channels.length; renderMenu(); }
                    else playChannel(currentIdx - 1);
                    break;
                case 'ArrowDown':
                    if (isMenu) { selectedIdx = (selectedIdx + 1) % channels.length; renderMenu(); }
                    else playChannel(currentIdx + 1);
                    break;
                case 'ArrowLeft': updateVolume(-1); break;
                case 'ArrowRight': updateVolume(1); break;
                case 'Enter':
                case 'OK':
                    if (isMenu) { playChannel(selectedIdx); toggleMenu(false); }
                    else toggleMenu(true);
                    break;
                case 'Escape':
                case 'Back':
                    if (isMenu) toggleMenu(false);
                    else toggleExit(true);
                    break;
            }
        });

        window.onload = loadChannels;
    </script>
</body>
</html>
