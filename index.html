<!DOCTYPE html>
<html lang="tr" class="bg-black">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; cursor: none; background-color: #000; }
        .full-screen-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .channel-menu { position: absolute; top: 0; left: -30%; width: 30%; height: 100%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); transition: left 0.3s ease; padding: 1.5rem; display: flex; flex-direction: column; z-index: 50; border-right: 1px solid rgba(255,255,255,0.1); }
        .channel-menu.open { left: 0; }
        .channel-list-item { padding: 0.8rem 1rem; font-weight: bold; color: #4dd0e1; text-transform: uppercase; border-radius: 8px; border: 2px solid transparent; margin-bottom: 0.3rem; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .channel-list-item.selected { background: rgba(77, 208, 225, 0.3); color: #fff; border-color: #fff; transform: scale(1.02); }
        .bottom-info-bar { position: absolute; bottom: 0; left: 0; width: 100%; background: linear-gradient(transparent, rgba(0,0,0,1)); padding: 3rem 2rem 1.5rem; opacity: 0; transition: opacity 0.5s; z-index: 40; pointer-events: none; }
        #exit-dialog { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 100; }
    </style>
</head>
<body class="bg-black text-white">

    <video id="video-player" class="full-screen-video" autoplay></video>

    <div id="channel-menu" class="channel-menu">
        <h2 class="text-xl font-black mb-6 tracking-widest border-b border-zinc-700 pb-2 text-cyan-400 uppercase">Kanal Listesi</h2>
        <ul id="channel-list" class="flex-grow overflow-y-auto pr-2"></ul>
    </div>

    <div id="bottom-info-bar" class="bottom-info-bar">
        <div class="text-xs font-bold text-zinc-500 tracking-widest uppercase">Oynatılıyor</div>
        <div id="info-channel-name" class="text-3xl font-black text-white uppercase">Yükleniyor...</div>
    </div>

    <div id="exit-dialog">
        <div class="bg-zinc-900 p-10 rounded-3xl border border-zinc-700 text-center">
            <h2 class="text-2xl font-black mb-8">ÇIKIŞ YAPILSIN MI?</h2>
            <div class="flex gap-6 justify-center">
                <button onclick="window.close()" class="bg-red-600 px-10 py-3 rounded-xl font-bold">EVET</button>
                <button onclick="toggleExit(false)" class="bg-zinc-700 px-10 py-3 rounded-xl font-bold">HAYIR</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const videoPlayer = document.getElementById('video-player');
        const channelList = document.getElementById('channel-list');
        const channelMenu = document.getElementById('channel-menu');
        const infoBar = document.getElementById('bottom-info-bar');
        const infoName = document.getElementById('info-channel-name');
        
        let channels = [];
        let currentIdx = 0;
        let selectedIdx = 0;
        let hls = null;
        let zapTimer, menuTimer, infoTimer;

        async function loadChannels() {
            try {
                // GitHub üzerinden taze veri çekmek için cache bozucu ekledik
                const response = await fetch('1.txt?t=' + Date.now());
                if (!response.ok) throw new Error('1.txt dosyası bulunamadı!');
                
                const data = await response.text();
                const lines = data.split('\n');
                
                channels = [];
                let currentName = "";

                lines.forEach(line => {
                    line = line.trim();
                    if (line.startsWith('#EXTINF')) {
                        // Virgül sonrasındaki ismi al (TiviMivi.txt yapısına uygun)
                        const nameParts = line.split(',');
                        currentName = nameParts[nameParts.length - 1].trim();
                    } else if (line.startsWith('http')) {
                        channels.push({
                            name: currentName || "Adsız Kanal",
                            url: line
                        });
                        currentName = "";
                    }
                });

                if (channels.length > 0) {
                    renderMenu();
                    playChannel(0);
                } else {
                    infoName.textContent = "LİSTE İÇİ BOŞ!";
                }
            } catch (err) {
                infoName.textContent = "DOSYA OKUNAMADI!";
                console.error(err);
            }
        }

        function playChannel(idx) {
            clearTimeout(zapTimer);
            zapTimer = setTimeout(() => {
                if (idx < 0) idx = channels.length - 1;
                if (idx >= channels.length) idx = 0;
                currentIdx = idx;
                const ch = channels[currentIdx];
                
                showInfo(ch.name);
                if (hls) hls.destroy();

                if (Hls.isSupported()) {
                    hls = new Hls({ 
                        maxBufferLength: 10,
                        maxMaxBufferLength: 20,
                        enableWorker: true,
                        lowLatencyMode: true
                    });
                    hls.loadSource(ch.url);
                    hls.attachMedia(videoPlayer);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => videoPlayer.play());
                } else {
                    videoPlayer.src = ch.url;
                    videoPlayer.play();
                }
            }, 500); // Hızlı geçiş (Zapping) koruması
        }

        function renderMenu() {
            channelList.innerHTML = '';
            channels.forEach((ch, i) => {
                const li = document.createElement('li');
                li.className = `channel-list-item ${i === selectedIdx ? 'selected' : ''}`;
                li.textContent = ch.name;
                channelList.appendChild(li);
            });
            const sel = channelList.querySelector('.selected');
            if (sel) sel.scrollIntoView({ block: 'center', behavior: 'smooth' });
        }

        function toggleMenu(show) {
            clearTimeout(menuTimer);
            if (show) {
                selectedIdx = currentIdx;
                renderMenu();
                channelMenu.classList.add('open');
                menuTimer = setTimeout(() => toggleMenu(false), 8000);
            } else {
                channelMenu.classList.remove('open');
            }
        }

        function showInfo(name) {
            clearTimeout(infoTimer);
            infoName.textContent = name;
            infoBar.style.opacity = "1";
            infoTimer = setTimeout(() => infoBar.style.opacity = "0", 4000);
        }

        function toggleExit(show) { 
            document.getElementById('exit-dialog').style.display = show ? 'flex' : 'none'; 
        }

        window.addEventListener('keydown', (e) => {
            const isMenu = channelMenu.classList.contains('open');
            const isExit = document.getElementById('exit-dialog').style.display === 'flex';

            if (isExit) return;

            switch (e.key) {
                case 'ArrowUp':
                    if (isMenu) {
                        selectedIdx = (selectedIdx - 1 + channels.length) % channels.length;
                        renderMenu();
                        clearTimeout(menuTimer);
                        menuTimer = setTimeout(() => toggleMenu(false), 10000);
                    } else {
                        playChannel(currentIdx - 1);
                    }
                    break;
                case 'ArrowDown':
                    if (isMenu) {
                        selectedIdx = (selectedIdx + 1) % channels.length;
                        renderMenu();
                        clearTimeout(menuTimer);
                        menuTimer = setTimeout(() => toggleMenu(false), 10000);
                    } else {
                        playChannel(currentIdx + 1);
                    }
                    break;
                case 'Enter':
                case 'OK':
                    if (isMenu) {
                        playChannel(selectedIdx);
                        toggleMenu(false);
                    } else {
                        toggleMenu(true);
                    }
                    break;
                case 'Escape':
                case 'Back':
                    if (isMenu) toggleMenu(false);
                    else toggleExit(true);
                    break;
            }
        });

        window.onload = loadChannels;
    </script>
</body>
</html>
